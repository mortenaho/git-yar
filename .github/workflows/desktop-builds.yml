name: Desktop builds

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//;s/+.*//')
          OUT="git-yar-${VERSION}-linux-x64"
          mkdir -p dist
          cp -a build/linux/x64/release/bundle "dist/${OUT}"
          tar -C dist -czf "dist/${OUT}.tar.gz" "${OUT}"

      - uses: actions/upload-artifact@v4
        with:
          name: git-yar-linux-x64
          path: dist/*.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package Windows release
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s*([^+]+)').Matches.Groups[1].Value.Trim()
          $out = "git-yar-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Recurse build/windows/x64/runner/Release "dist/$out"
          Compress-Archive -Path "dist/$out" -DestinationPath "dist/$out.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: git-yar-windows-x64
          path: dist/*.zip

  release:
    name: Attach to GitHub Release
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
